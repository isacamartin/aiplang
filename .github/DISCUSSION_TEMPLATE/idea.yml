title: "[Idea] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Boa ideia! Descreva o que você quer e por que seria útil.
  - type: textarea
    id: problem
    attributes:
      label: Qual problema isso resolve?
      placeholder: "Hoje quando quero X, preciso fazer Y manualmente..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Como ficaria a sintaxe .aip?
      render: aip
      placeholder: |
        # Exemplo de como você imagina a feature
        ~nova-diretiva valor
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Urgência para você
      options:
        - "Nice to have"
        - "Importante"
        - "Bloqueando meu uso"
    validations:
      required: true
