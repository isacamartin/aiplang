name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: aiplang test suite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/aiplang-pkg/package-lock.json

      - name: Install dependencies
        working-directory: packages/aiplang-pkg
        run: npm ci

      - name: Syntax check — all JS files
        working-directory: packages/aiplang-pkg
        run: |
          node --check bin/aiplang.js
          node --check server/server.js
          node --check runtime/aiplang-hydrate.js
          node --check runtime/aiplang-runtime.js
          echo "✓ All files syntax OK"

      - name: CLI version check
        working-directory: packages/aiplang-pkg
        run: node bin/aiplang.js --version

      - name: Build all templates
        working-directory: packages/aiplang-pkg
        run: |
          for tpl in ../../templates/*.aip; do
            echo "Building: $(basename $tpl)"
            node bin/aiplang.js build "$tpl" --out "/tmp/build-$(basename $tpl .aip)" 2>&1
          done
          echo "✓ All templates built"

      - name: Integration tests
        working-directory: packages/aiplang-pkg
        timeout-minutes: 2
        env:
          JWT_SECRET: ci-test-secret-2025
        run: node ../../scripts/ci-test.js
